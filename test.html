<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge Direct Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
.container { max-width: 800px; margin: 0 auto; }
h1 { color: #a78bfa; margin-bottom: 0.5rem; font-size: 1.8rem; }
.subtitle { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
.card { background: #14141f; border: 1px solid #2a2a3a; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.card h2 { color: #c4b5fd; font-size: 1.1rem; margin-bottom: 1rem; }
.dropzone { border: 2px dashed #4c1d95; border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; background: #0f0a1a; }
.dropzone:hover, .dropzone.dragover { border-color: #a78bfa; background: #1a0f2e; }
.dropzone p { color: #9ca3af; margin-bottom: 0.5rem; }
.dropzone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
#fileInput { display: none; }
.btn { background: #4c1d95; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: background 0.2s; }
.btn:hover { background: #6d28d9; }
.btn:disabled { background: #333; color: #666; cursor: not-allowed; }
.btn-secondary { background: #1e1e2e; border: 1px solid #333; }
.btn-secondary:hover { background: #2a2a3e; }
.progress-container { margin-top: 1rem; display: none; }
.progress-bar { height: 8px; background: #1e1e2e; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #4c1d95, #a78bfa); width: 0%; transition: width 0.3s; border-radius: 4px; }
.progress-text { display: flex; justify-content: space-between; margin-top: 0.4rem; font-size: 0.85rem; color: #9ca3af; }
.result { margin-top: 1rem; padding: 1rem; border-radius: 8px; display: none; }
.result.success { background: #0f2e1a; border: 1px solid #166534; display: block; }
.result.error { background: #2e0f0f; border: 1px solid #991b1b; display: block; }
.result h3 { margin-bottom: 0.5rem; font-size: 1rem; }
.result.success h3 { color: #4ade80; }
.result.error h3 { color: #f87171; }
.result pre { background: #0a0a0f; padding: 0.8rem; border-radius: 6px; font-size: 0.8rem; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
.result img { max-width: 100%; border-radius: 6px; margin-top: 0.5rem; }
.result a { color: #a78bfa; }
.log { background: #0a0a0f; border: 1px solid #1e1e2e; border-radius: 8px; padding: 1rem; max-height: 300px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; line-height: 1.6; }
.log-entry { padding: 0.2rem 0; border-bottom: 1px solid #111; }
.log-entry.info { color: #9ca3af; }
.log-entry.success { color: #4ade80; }
.log-entry.error { color: #f87171; }
.log-entry.warn { color: #fbbf24; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat { background: #14141f; border: 1px solid #2a2a3a; border-radius: 8px; padding: 1rem; text-align: center; }
.stat .value { font-size: 1.5rem; font-weight: 700; color: #a78bfa; }
.stat .label { font-size: 0.75rem; color: #666; margin-top: 0.3rem; }
.file-list { margin-top: 1rem; }
.file-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem; background: #0f0f1a; border-radius: 6px; margin-bottom: 0.4rem; font-size: 0.85rem; }
.file-item .file-icon { font-size: 1.2rem; }
.file-item .file-info { flex: 1; }
.file-item .file-name { color: #e0e0e0; }
.file-item .file-size { color: #666; font-size: 0.75rem; }
.file-item .file-actions { display: flex; gap: 0.4rem; }
.file-item .file-actions .btn { padding: 0.3rem 0.8rem; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="container">
  <h1>🌉 Bridge Direct Test</h1>
  <p class="subtitle">Upload files directly to the Telegram Bridge — test full capability (up to 2GB)</p>

  <div class="stats" id="stats">
    <div class="stat"><div class="value" id="statTotal">0</div><div class="label">Total Uploads</div></div>
    <div class="stat"><div class="value" id="statBytes">0 MB</div><div class="label">Total Bytes</div></div>
    <div class="stat"><div class="value" id="statLast">—</div><div class="label">Last Upload</div></div>
  </div>

  <div class="card">
    <h2>📤 Upload File</h2>
    <div class="dropzone" id="dropzone">
      <div class="icon">📁</div>
      <p><strong>Drop file here</strong> or click to browse</p>
      <p style="font-size:0.8rem;color:#666;">Supports any file type up to 2GB</p>
      <input type="file" id="fileInput">
    </div>
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text">
        <span id="progressSize">0 MB</span>
        <span id="progressPercent">0%</span>
      </div>
    </div>
    <div class="result" id="result"></div>
  </div>

  <div class="card">
    <h2>📋 Activity Log</h2>
    <div class="log" id="log"></div>
  </div>

  <div class="card">
    <h2>📦 Recent Uploads</h2>
    <div class="file-list" id="fileList"></div>
  </div>
</div>

<script>
const BRIDGE_URL = 'https://bridge-api.nhprince.dpdns.org';
const BRIDGE_API_KEY = 'prince_snaps_bridge_2026';
const APP_ID = 'bridge-test';

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const progressContainer = document.getElementById('progressContainer');
const progressFill = document.getElementById('progressFill');
const progressSize = document.getElementById('progressSize');
const progressPercent = document.getElementById('progressPercent');
const result = document.getElementById('result');
const log = document.getElementById('log');
const fileList = document.getElementById('fileList');

let uploads = [];
let totalBytes = 0;

function addLog(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  log.prepend(el);
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
  return (bytes/1024/1024/1024).toFixed(2) + ' GB';
}

function updateStats() {
  document.getElementById('statTotal').textContent = uploads.length;
  document.getElementById('statBytes').textContent = formatSize(totalBytes);
}

function showResult(success, title, body, imageUrl) {
  result.className = success ? 'result success' : 'result error';
  let html = `<h3>${success ? '✅' : '❌'} ${title}</h3><pre>${body}</pre>`;
  if (imageUrl) {
    html += `<img src="${imageUrl}" alt="uploaded file" onerror="this.style.display='none'">`;
    html += `<p style="margin-top:0.5rem;"><a href="${imageUrl}" target="_blank">🔗 Open full size</a></p>`;
  }
  result.innerHTML = html;
  result.style.display = 'block';
}

function addFileToList(file) {
  const item = document.createElement('div');
  item.className = 'file-item';
  const isImage = file.mime_type?.startsWith('image/');
  item.innerHTML = `
    <span class="file-icon">${isImage ? '🖼️' : '📄'}</span>
    <div class="file-info">
      <div class="file-name">${file.file_name}</div>
      <div class="file-size">${formatSize(file.file_size)} · ${file.mime_type}</div>
    </div>
    <div class="file-actions">
      <a href="${file.download_url}" target="_blank" class="btn">Download</a>
    </div>
  `;
  fileList.prepend(item);
}

// Dropzone handlers
dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

async function handleFile(file) {
  addLog(`Starting upload: ${file.name} (${formatSize(file.size)})`, 'info');
  result.style.display = 'none';
  progressContainer.style.display = 'block';
  progressFill.style.width = '0%';
  progressSize.textContent = '0 / ' + formatSize(file.size);
  progressPercent.textContent = '0%';

  const formData = new FormData();
  formData.append('file', file);
  formData.append('app_id', APP_ID);
  formData.append('description', 'Bridge direct test upload');

  const xhr = new XMLHttpRequest();

  xhr.upload.addEventListener('progress', (e) => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      progressFill.style.width = pct + '%';
      progressSize.textContent = formatSize(e.loaded) + ' / ' + formatSize(e.total);
      progressPercent.textContent = pct + '%';
    }
  });

  xhr.addEventListener('load', () => {
    progressContainer.style.display = 'none';
    if (xhr.status >= 200 && xhr.status < 300) {
      try {
        const data = JSON.parse(xhr.responseText);
        addLog(`Upload SUCCESS: file_id=${data.file_id}, size=${formatSize(data.file_size)}`, 'success');
        const fileData = { ...data, file_name: file.name, file_size: file.size, mime_type: file.type };
        uploads.push(fileData);
        totalBytes += file.size;
        updateStats();
        document.getElementById('statLast').textContent = file.name.substring(0, 12);
        showResult(true, 'Upload Complete', JSON.stringify(data, null, 2), data.download_url);
        addFileToList(fileData);
      } catch (e) {
        addLog(`Parse error: ${e.message}`, 'error');
        showResult(false, 'Parse Error', xhr.responseText);
      }
    } else {
      let errorMsg = xhr.responseText;
      try { errorMsg = JSON.parse(xhr.responseText).detail || errorMsg; } catch {}
      addLog(`Upload FAILED: HTTP ${xhr.status} — ${errorMsg}`, 'error');
      showResult(false, `Upload Failed (${xhr.status})`, errorMsg);
    }
  });

  xhr.addEventListener('error', () => {
    progressContainer.style.display = 'none';
    addLog('Network error — bridge unreachable?', 'error');
    showResult(false, 'Network Error', 'Could not connect to bridge-api.nhprince.dpdns.org');
  });

  xhr.addEventListener('timeout', () => {
    progressContainer.style.display = 'none';
    addLog('Upload timed out', 'error');
    showResult(false, 'Timeout', 'Upload timed out after 5 minutes');
  });

  xhr.open('POST', `${BRIDGE_URL}/v1/upload`);
  xhr.setRequestHeader('X-API-Key', BRIDGE_API_KEY);
  xhr.timeout = 30 * 60 * 1000; // 30 minutes (Telegram MTProto is slow for large files)
  xhr.send(formData);
}

// Load recent files on page load
async function loadRecent() {
  try {
    const res = await fetch(`${BRIDGE_URL}/v1/files?app_id=${APP_ID}&limit=10`, {
      headers: { 'X-API-Key': BRIDGE_API_KEY }
    });
    if (res.ok) {
      const data = await res.json();
      fileList.innerHTML = '';
      if (data.files?.length) {
        data.files.forEach(addFileToList);
        addLog(`Loaded ${data.files.length} recent files`, 'info');
      } else {
        addLog('No files uploaded yet', 'info');
      }
    }
  } catch (e) {
    addLog(`Could not load file list: ${e.message}`, 'warn');
  }
}

addLog('Bridge test page ready', 'success');
addLog(`Bridge URL: ${BRIDGE_URL}`, 'info');
loadRecent();
</script>
</body>
</html>
